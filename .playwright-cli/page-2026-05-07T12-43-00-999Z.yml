      - heading "1. 初始化 MCP 会话" [level=3] [ref=e751]
      - code [ref=e146]: "curl -X POST 'https://developer.zhihu.com/api/mcp/zhida/v1/stream' \\ -H 'Authorization: Bearer <your_access_secret>' \\ -H 'Content-Type: application/json' \\ -d '{ \"jsonrpc\": \"2.0\", \"id\": 1, \"method\": \"initialize\", \"params\": { \"protocolVersion\": \"2025-10-28\", \"clientInfo\": { \"name\": \"demo-client\", \"version\": \"1.0.0\" }, \"capabilities\": {} } }'"
