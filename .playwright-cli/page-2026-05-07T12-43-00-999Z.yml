      - heading "3. 调用直答工具" [level=3] [ref=e753]
      - code [ref=e516]: "curl -N -X POST 'https://developer.zhihu.com/api/mcp/zhida/v1/stream' \\ -H 'Authorization: Bearer <your_access_secret>' \\ -H 'Content-Type: application/json' \\ -H 'Accept: text/event-stream' \\ -d '{ \"jsonrpc\": \"2.0\", \"id\": 3, \"method\": \"tools/call\", \"params\": { \"name\": \"zhida\", \"arguments\": { \"query\": \"什么是 RAG？\" } } }'"
      - paragraph [ref=e248]: 流式响应示例：
