          - heading "curl 示例" [level=2] [ref=e1143]
          - code [ref=e1145]: "#!/bin/bash # 点赞/取消点赞脚本 # 用法: ./reaction.sh <content_type> <content_token> <action_value> set -e # 配置信息 DOMAIN=\"https://openapi.zhihu.com\" APP_KEY=\"\" # 用户token APP_SECRET=\"\" # 知乎提供 # 检查参数 if [ $# -lt 3 ]; then echo \"用法: $0 <content_type> <content_token> <action_value>\" echo \"\" echo \"参数:\" echo \" content_type 内容类型: pin 或 comment\" echo \" content_token 内容ID\" echo \" action_value 1=点赞, 0=取消点赞\" echo \"\" echo \"示例:\" echo \" $0 pin 2001614683480822500 1 # 对想法点赞\" echo \" $0 pin 2001614683480822500 0 # 取消想法点赞\" echo \" $0 comment 11407772941 1 # 对评论点赞\" echo \" $0 comment 11407772941 0 # 取消评论点赞\" exit 1 fi CONTENT_TYPE=\"$1\" CONTENT_TOKEN=\"$2\" ACTION_VALUE=\"$3\" # 生成时间戳和日志ID TIMESTAMP=$(date +%s) LOG_ID=\"log_$(date +%s%N | md5sum | cut -c1-16)\" # 生成签名 SIGN_STRING=\"app_key:${APP_KEY}|ts:${TIMESTAMP}|logid:${LOG_ID}|extra_info:\" SIGNATURE=$(echo -n \"$SIGN_STRING\" | openssl dgst -sha256 -hmac \"$APP_SECRET\" -binary | base64) # 构建请求体 JSON_DATA=$(cat <<EOF { \"content_token\": \"${CONTENT_TOKEN}\", \"content_type\": \"${CONTENT_TYPE}\", \"action_type\": \"like\", \"action_value\": ${ACTION_VALUE} } EOF ) # 发送请求 curl -s -X POST \"${DOMAIN}/openapi/reaction\" \\ -H \"X-App-Key: ${APP_KEY}\" \\ -H \"X-Timestamp: ${TIMESTAMP}\" \\ -H \"X-Log-Id: ${LOG_ID}\" \\ -H \"X-Sign: ${SIGNATURE}\" \\ -H \"X-Extra-Info: \" \\ -H \"Content-Type: application/json\" \\ -d \"$JSON_DATA\""
          - heading "注意事项" [level=2] [ref=e1146]
