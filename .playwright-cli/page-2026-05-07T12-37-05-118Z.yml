          - heading "curl 示例" [level=2] [ref=e733]
          - code [ref=e735]: "#!/bin/bash APP_KEY=\"your_app_key\" # 用户token APP_SECRET=\"your_app_secret\" # 知乎提供 DOMAIN=\"https://openapi.zhihu.com\" # 检查参数 if [ $# -lt 2 ]; then echo \"用法:\" echo \" 获取想法的一级评论: $0 pin <pin_id> [page_num] [page_size]\" echo \" 获取评论的二级评论: $0 comment <root_id> [page_num] [page_size]\" echo \"\" echo \"参数说明:\" echo \" content_type: pin 或 comment\" echo \" content_token: 想法ID（当 content_type=pin）或一级评论ID（当 content_type=comment）\" echo \" page_num: 页码，默认 1\" echo \" page_size: 每页条数，默认 10，最多 50\" echo \"\" echo \"示例:\" echo \" $0 pin 1992012205256892542\" echo \" $0 pin 1992012205256892542 2 20\" echo \" $0 comment 11386670165\" echo \" $0 comment 11386670165 1 15\" exit 1 fi CONTENT_TYPE=\"$1\" CONTENT_TOKEN=\"$2\" PAGE_NUM=${3:-1} PAGE_SIZE=${4:-10} TIMESTAMP=$(date +%s) LOG_ID=\"test-${TIMESTAMP}\" # 生成签名 SIGN_STR=\"app_key:${APP_KEY}|ts:${TIMESTAMP}|logid:${LOG_ID}|extra_info:\" SIGN=$(echo -n \"$SIGN_STR\" | openssl dgst -sha256 -hmac \"$APP_SECRET\" -binary | base64) # 构建查询参数 QUERY_PARAMS=\"content_token=${CONTENT_TOKEN}&content_type=${CONTENT_TYPE}&page_num=${PAGE_NUM}&page_size=${PAGE_SIZE}\" # 发送 GET 请求 curl -s \"${DOMAIN}/openapi/comment/list?${QUERY_PARAMS}\" \\ -H \"X-App-Key: ${APP_KEY}\" \\ -H \"X-Timestamp: ${TIMESTAMP}\" \\ -H \"X-Sign: ${SIGN}\" \\ -H \"X-Log-Id: ${LOG_ID}\" \\ -H \"X-Extra-Info: \""
