          - heading "curl 示例" [level=2] [ref=e859]
          - code [ref=e861]: "#!/bin/bash # 评论创建脚本（支持一级评论和回复评论） # 用法: # 对想法发一级评论: ./post_comment.sh pin <pin_id> <content> # 回复某条评论: ./post_comment.sh comment <comment_id> <content> set -e # 配置信息 DOMAIN=\"https://openapi.zhihu.com\" APP_KEY=\"\" APP_SECRET=\"\" # 检查参数 if [ $# -lt 3 ]; then echo \"用法:\" echo \" 对想法发一级评论: $0 pin <pin_id> <content>\" echo \" 回复某条评论: $0 comment <comment_id> <content>\" echo \"\" echo \"示例:\" echo \" $0 pin 2001614683480822500 '这是一条评论'\" echo \" $0 comment 123456 '这是一条回复'\" exit 1 fi CONTENT_TYPE=\"$1\" CONTENT_TOKEN=\"$2\" CONTENT=\"$3\" # 生成时间戳和日志ID TIMESTAMP=$(date +%s) LOG_ID=\"log_$(date +%s%N | md5sum | cut -c1-16)\" # 生成签名 SIGN_STRING=\"app_key:${APP_KEY}|ts:${TIMESTAMP}|logid:${LOG_ID}|extra_info:\" SIGNATURE=$(echo -n \"$SIGN_STRING\" | openssl dgst -sha256 -hmac \"$APP_SECRET\" -binary | base64) # 构建请求体 if command -v jq &>/dev/null; then REQUEST_BODY=$(jq -n --arg token \"$CONTENT_TOKEN\" --arg type \"$CONTENT_TYPE\" --arg content \"$CONTENT\" '{content_token: $token, content_type: $type, content: $content}') else CONTENT_ESC=$(echo -n \"$CONTENT\" | sed 's/\\\\/\\\\\\\\/g; s/\"/\\\\\"/g') REQUEST_BODY=\"{\\\"content_token\\\":\\\"${CONTENT_TOKEN}\\\",\\\"content_type\\\":\\\"${CONTENT_TYPE}\\\",\\\"content\\\":\\\"${CONTENT_ESC}\\\"}\" fi # 发送请求 curl -s -X POST \"${DOMAIN}/openapi/comment/create\" \\ -H \"X-App-Key: ${APP_KEY}\" \\ -H \"X-Timestamp: ${TIMESTAMP}\" \\ -H \"X-Log-Id: ${LOG_ID}\" \\ -H \"X-Sign: ${SIGNATURE}\" \\ -H \"X-Extra-Info: \" \\ -H \"Content-Type: application/json\" \\ -d \"$REQUEST_BODY\""
