      - paragraph [ref=e240]:
        - text: 工具调用结果为
        - code [ref=e504]: text
        - text: 类型内容，正文为面向大模型消费的结构化文本。
      - paragraph [ref=e248]: 返回主体示例：
      - code [ref=e146]: <global_search query="人工智能"> <search_item title="人工智能发展趋势与展望" content_type="Article" url="https://..." author_name="张三" author_avatar="https://..." author_badge_text="" edit_time="2025-03-01 10:00:00 +0000 UTC" authority_level="2" ranking_score="0.9800"> 近年来，人工智能（AI）的发展速度令人瞩目 ... </search_item> </global_search>
      - paragraph [ref=e505]: 说明：
      - list [ref=e506]:
        - listitem [ref=e507]:
          - text: 返回值外层是 MCP
          - code [ref=e508]: text
          - text: 类型，文本内容为 XML。
        - listitem [ref=e509]: 建议将整段 XML 原样交给模型消费，不建议自行裁剪字段。
      - heading "接入流程" [level=2] [ref=e510]
      - heading "1. 建立 SSE 连接" [level=3] [ref=e511]
      - code [ref=e239]: "curl -N 'https://developer.zhihu.com/api/mcp/global_search/v1/sse' \\ -H 'Authorization: Bearer <your_access_secret>' \\ -H 'Accept: text/event-stream'"
      - paragraph [ref=e512]:
        - text: 服务端会先返回一条
        - code [ref=e513]: endpoint
        - text: 事件，例如：
      - code [ref=e516]: "event: endpoint data: /api/mcp/global_search/v1/message?sessionId=xxx"
      - heading "2. 初始化 MCP 会话" [level=3] [ref=e517]
      - paragraph [ref=e518]:
        - text: 将上一步拿到的
        - code [ref=e519]: message
        - text: 地址记为
        - code [ref=e520]: MESSAGE_URL
        - text: 。
      - code [ref=e523]: "curl -X POST \"$MESSAGE_URL\" \\ -H 'Authorization: Bearer <your_access_secret>' \\ -H 'Content-Type: application/json' \\ -d '{ \"jsonrpc\": \"2.0\", \"id\": 1, \"method\": \"initialize\", \"params\": { \"protocolVersion\": \"2024-11-05\", \"clientInfo\": { \"name\": \"demo-client\", \"version\": \"1.0.0\" }, \"capabilities\": {} } }'"
      - paragraph [ref=e524]: 说明：
      - list [ref=e525]:
        - listitem [ref=e526]:
          - code [ref=e527]: message
          - text: 端点通常会先返回 HTTP
          - code [ref=e528]: 202 Accepted
          - text: 。
        - listitem [ref=e529]: 实际 JSON-RPC 响应会通过已建立的 SSE 通道异步返回。
      - heading "3. 获取工具列表" [level=3] [ref=e530]
      - code [ref=e533]: "curl -X POST \"$MESSAGE_URL\" \\ -H 'Authorization: Bearer <your_access_secret>' \\ -H 'Content-Type: application/json' \\ -d '{ \"jsonrpc\": \"2.0\", \"id\": 2, \"method\": \"tools/list\" }'"
      - heading "4. 调用搜索工具" [level=3] [ref=e534]
      - code [ref=e537]: "curl -X POST \"$MESSAGE_URL\" \\ -H 'Authorization: Bearer <your_access_secret>' \\ -H 'Content-Type: application/json' \\ -d '{ \"jsonrpc\": \"2.0\", \"id\": 3, \"method\": \"tools/call\", \"params\": { \"name\": \"global_search\", \"arguments\": { \"query\": \"人工智能\", \"count\": 5 } } }'"
      - paragraph [ref=e538]: SSE 通道中会收到对应响应，例如：
      - code [ref=e541]: "event: message data: {\"jsonrpc\":\"2.0\",\"id\":3,\"result\":{\"content\":[{\"type\":\"text\",\"text\":\"<global_search query=\\\"人工智能\\\">...\"}]}}"
      - heading "注意事项" [level=2] [ref=e542]
      - list [ref=e436]:
        - listitem [ref=e437]: 该服务采用标准 MCP 工具调用模式，推荐直接使用现成 MCP Client 接入。
        - listitem [ref=e438]:
          - code [ref=e543]: tools/call
          - text: 的结果通过已建立的 SSE 通道返回，而不是直接同步返回在 POST 响应体中。
        - listitem [ref=e544]: 全网搜索适合做信息补充与外部参考检索，若仅需知乎站内结果，建议优先使用知乎搜索 MCP。