          - heading "curl 示例" [level=2] [ref=e425]
          - code [ref=e427]: "#!/bin/bash # 圈子详情查询脚本 # 用法: ./ring_detail.sh <ring_id> [page_num] [page_size] set -e # 配置信息 DOMAIN=\"https://openapi.zhihu.com\" APP_KEY=\"\" # 用户token APP_SECRET=\"\" # 知乎提供 # 检查参数 if [ $# -lt 1 ]; then echo \"用法: $0 <ring_id> [page_num] [page_size]\" exit 1 fi RING_ID=\"$1\" PAGE_NUM=\"${2:-1}\" PAGE_SIZE=\"${3:-20}\" # 生成时间戳和日志ID TIMESTAMP=$(date +%s) LOG_ID=\"log_$(date +%s%N | md5sum | cut -c1-16)\" # 生成签名 SIGN_STRING=\"app_key:${APP_KEY}|ts:${TIMESTAMP}|logid:${LOG_ID}|extra_info:\" SIGNATURE=$(echo -n \"$SIGN_STRING\" | openssl dgst -sha256 -hmac \"$APP_SECRET\" -binary | base64) # 发送请求 curl \"${DOMAIN}/openapi/ring/detail?ring_id=${RING_ID}&page_num=${PAGE_NUM}&page_size=${PAGE_SIZE}\" \\ -H \"X-App-Key: ${APP_KEY}\" \\ -H \"X-Timestamp: ${TIMESTAMP}\" \\ -H \"X-Log-Id: ${LOG_ID}\" \\ -H \"X-Sign: ${SIGNATURE}\" \\ -H \"X-Extra-Info: \""
