          - heading "curl 示例" [level=2] [ref=e992]
          - code [ref=e994]: "#!/bin/bash # 删除评论脚本 # 用法: ./delete_comment.sh <comment_id> set -e # 配置信息 DOMAIN=\"https://openapi.zhihu.com\" APP_KEY=\"\" # 用户token APP_SECRET=\"\" # 知乎提供 # 检查参数 if [ $# -lt 1 ]; then echo \"用法: $0 <comment_id>\" echo \"\" echo \"参数:\" echo \" comment_id 评论ID (必填)\" echo \"\" echo \"示例:\" echo \" $0 11408509968\" exit 1 fi COMMENT_ID=\"$1\" # 生成时间戳和日志ID TIMESTAMP=$(date +%s) LOG_ID=\"log_$(date +%s%N | md5sum | cut -c1-16)\" # 生成签名 SIGN_STRING=\"app_key:${APP_KEY}|ts:${TIMESTAMP}|logid:${LOG_ID}|extra_info:\" SIGNATURE=$(echo -n \"$SIGN_STRING\" | openssl dgst -sha256 -hmac \"$APP_SECRET\" -binary | base64) # 构建请求体 JSON_DATA=\"{\\\"comment_id\\\":\\\"${COMMENT_ID}\\\"}\" # 发送请求 curl -s -X POST \"${DOMAIN}/openapi/comment/delete\" \\ -H \"X-App-Key: ${APP_KEY}\" \\ -H \"X-Timestamp: ${TIMESTAMP}\" \\ -H \"X-Log-Id: ${LOG_ID}\" \\ -H \"X-Sign: ${SIGNATURE}\" \\ -H \"X-Extra-Info: \" \\ -H \"Content-Type: application/json\" \\ -d \"$JSON_DATA\""
