      - heading "接入流程" [level=2] [ref=e884]
      - heading "1. 建立 SSE 连接" [level=3] [ref=e885]
      - code [ref=e239]: "curl -N 'https://developer.zhihu.com/api/mcp/hot_list/v1/sse' \\ -H 'Authorization: Bearer <your_access_secret>' \\ -H 'Accept: text/event-stream'"
      - paragraph [ref=e886]:
        - text: 服务端会先返回一条
        - code [ref=e887]: endpoint
        - text: 事件，例如：
      - code [ref=e890]: "event: endpoint data: /api/mcp/hot_list/v1/message?sessionId=xxx"
      - heading "2. 初始化 MCP 会话" [level=3] [ref=e891]
      - paragraph [ref=e892]:
        - text: 将上一步拿到的
        - code [ref=e893]: message
        - text: 地址记为
        - code [ref=e894]: MESSAGE_URL
        - text: 。
      - code [ref=e897]: "curl -X POST \"$MESSAGE_URL\" \\ -H 'Authorization: Bearer <your_access_secret>' \\ -H 'Content-Type: application/json' \\ -d '{ \"jsonrpc\": \"2.0\", \"id\": 1, \"method\": \"initialize\", \"params\": { \"protocolVersion\": \"2024-11-05\", \"clientInfo\": { \"name\": \"demo-client\", \"version\": \"1.0.0\" }, \"capabilities\": {} } }'"
      - paragraph [ref=e898]: 说明：
      - list [ref=e899]:
        - listitem [ref=e900]:
          - code [ref=e901]: message
          - text: 端点通常会先返回 HTTP
          - code [ref=e902]: 202 Accepted
          - text: 。
        - listitem [ref=e903]: 实际 JSON-RPC 响应会通过已建立的 SSE 通道异步返回。
      - heading "3. 获取工具列表" [level=3] [ref=e904]
      - code [ref=e907]: "curl -X POST \"$MESSAGE_URL\" \\ -H 'Authorization: Bearer <your_access_secret>' \\ -H 'Content-Type: application/json' \\ -d '{ \"jsonrpc\": \"2.0\", \"id\": 2, \"method\": \"tools/list\" }'"
      - heading "4. 调用热榜工具" [level=3] [ref=e908]
      - code [ref=e911]: "curl -X POST \"$MESSAGE_URL\" \\ -H 'Authorization: Bearer <your_access_secret>' \\ -H 'Content-Type: application/json' \\ -d '{ \"jsonrpc\": \"2.0\", \"id\": 3, \"method\": \"tools/call\", \"params\": { \"name\": \"hot_list\", \"arguments\": { \"limit\": 10 } } }'"
      - paragraph [ref=e912]: SSE 通道中会收到对应响应，例如：
      - code [ref=e915]: "event: message data: {\"jsonrpc\":\"2.0\",\"id\":3,\"result\":{\"content\":[{\"type\":\"text\",\"text\":\"<hot_list limit=\\\"10\\\" total=\\\"10\\\">...\"}]}}"
      - heading "注意事项" [level=2] [ref=e916]
      - list [ref=e917]:
        - listitem [ref=e918]: 该服务采用标准 MCP 工具调用模式，推荐直接使用现成 MCP Client 接入。
        - listitem [ref=e919]:
          - code [ref=e920]: tools/call
          - text: 的结果通过已建立的 SSE 通道返回，而不是直接同步返回在 POST 响应体中。
        - listitem [ref=e921]: 热榜结果偏实时性，列表顺序和内容会随时间变化。