<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    font: 13px/1.5 -apple-system, BlinkMacSystemFont, sans-serif;
    color: #333;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
  }

  .titlebar {
    height: 44px;
    flex-shrink: 0;
    background: #ebebeb;
    border-bottom: 1px solid #d8d8d8;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-app-region: drag;
    font-size: 13px;
    font-weight: 500;
    color: #333;
    letter-spacing: -0.1px;
  }

  .content {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px 20px;
  }

  .group { margin-bottom: 14px; }
  .group label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }
  .group .row { display: flex; align-items: center; gap: 8px; }
  .group input[type=range] { flex: 1; accent-color: #888; }
  .group .val { font-size: 12px; color: #666; min-width: 36px; text-align: right; font-variant-numeric: tabular-nums; }

  hr { border: none; border-top: 1px solid #e0e0e0; margin: 14px 0; }

  .btn {
    display: inline-block; padding: 5px 14px;
    border-radius: 4px; border: 1px solid #bbb; cursor: pointer;
    font-size: 12px; font-weight: 400; background: #fff; color: #444;
    transition: all 0.12s;
  }
  .btn:hover { background: #f0f0f0; border-color: #aaa; }
  .btn-primary { background: #444; color: #fff; border-color: #444; }
  .btn-primary:hover { background: #555; }

  .status { font-size: 11px; color: #999; margin-top: 10px; min-height: 16px; }

  .app-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px;
    border-radius: 6px;
    background: #fafafa;
    margin-bottom: 2px;
    border: 1px solid transparent;
  }
  .app-item:hover { background: #f0f0f0; border-color: #e0e0e0; }
  .app-icon { font-size: 16px; width: 22px; text-align: center; flex-shrink: 0; }
  .app-icon img { width: 16px; height: 16px; object-fit: contain; vertical-align: middle; border-radius: 3px; }
  .app-name { font-size: 13px; color: #333; flex: 1; }
  .app-item .del {
    margin-left: auto; cursor: pointer;
    color: #ccc; font-size: 14px; padding: 3px 7px;
    border-radius: 4px; transition: all 0.12s; line-height: 1;
  }
  .app-item .del:hover { color: #e74c3c; background: rgba(231,76,60,0.06); }

  .app-row { display:flex; gap:6px; margin-top: 8px; align-items:center; }

  #customAppSelect {
    flex:1; background: #fff; border: 1px solid #ddd;
    color: #444; padding: 5px 8px; border-radius: 4px;
    font-size: 12px; outline: none; max-width: 200px;
  }
  #customAppSelect:focus { border-color: #999; }

  .add-btn {
    background: #666; color: #fff; border: none;
    padding: 5px 12px; border-radius: 4px;
    font-size: 12px; cursor: pointer; transition: background 0.12s;
    white-space: nowrap;
  }
  .add-btn:hover { background: #555; }

  .actions { display: flex; gap: 8px; margin-top: 4px; }
  .actions.btns { justify-content: flex-end; margin-top: 16px; }

  .anim-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
    margin-top: 6px;
  }
  .anim-btn {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 10px 8px; border-radius: 8px;
    border: 1px solid #ddd; cursor: pointer;
    background: #fff; color: #444;
    font-size: 11px; text-align: center;
    transition: all 0.12s; line-height: 1.2;
    -webkit-app-region: no-drag;
  }
  .anim-btn:hover { background: #f0f0f0; border-color: #aaa; }
  .anim-btn.playing { background: #f0f8e8; border-color: #8bc34a; color: #4a7c1f; }
  .anim-btn .anim-icon { font-size: 20px; }

  input, button, select, textarea, a, .app-item, .btn, .del, .add-btn {
    -webkit-app-region: no-drag;
  }
</style>
</head>
<body>

<div class="titlebar">Settings</div>

<div class="content">

<div class="group">
  <label>Idle 帧间隔 (ms)</label>
  <div class="row">
    <input type="range" id="idleFrame" min="80" max="800" value="180" step="10">
    <span class="val" id="idleFrameVal">180</span>
  </div>
</div>

<div class="group">
  <label>Walk 帧间隔 (ms)</label>
  <div class="row">
    <input type="range" id="walkFrame" min="50" max="500" value="120" step="10">
    <span class="val" id="walkFrameVal">120</span>
  </div>
</div>

<div class="group">
  <label>Walk 速度 (px/s)</label>
  <div class="row">
    <input type="range" id="walkSpeed" min="10" max="300" value="150" step="5">
    <span class="val" id="walkSpeedVal">150</span>
  </div>
</div>

<div class="group">
  <label>Sit 帧间隔 (ms)</label>
  <div class="row">
    <input type="range" id="sitFrame" min="100" max="1000" value="400" step="10">
    <span class="val" id="sitFrameVal">400</span>
  </div>
</div>

<div class="group">
  <label>Poke 帧间隔 (ms)</label>
  <div class="row">
    <input type="range" id="pokeFrame" min="30" max="300" value="70" step="10">
    <span class="val" id="pokeFrameVal">70</span>
  </div>
</div>

<div class="group">
  <label>显示缩放</label>
  <div class="row">
    <input type="range" id="displayScale" min="0.3" max="3.0" value="0.7" step="0.1">
    <span class="val" id="displayScaleVal">0.7</span>
  </div>
</div>

<hr>

<div class="group">
  <label>应用菜单</label>
  <div id="appList" style="display:flex;flex-direction:column;gap:2px;margin-top:4px;"></div>
  <div class="app-row">
    <select id="customAppSelect">
      <option value="">— 选择应用 —</option>
    </select>
    <button class="add-btn" id="addAppBtn">+ 添加</button>
  </div>
</div>

<hr>

<div class="group">
  <label>激活动画</label>
  <div class="anim-grid" id="animGrid"></div>
</div>

<hr>

<div class="group" style="margin-top:6px;">
  <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
    <input type="checkbox" id="showWindowBorder" style="-webkit-app-region:no-drag;">
    <span>窗口边框描线（对话/bubble 等窗体）</span>
  </label>
</div>

<hr>

<div class="group">
  <label>快捷操作</label>
  <div class="actions">
    <button class="btn" id="menuBtn">应用菜单</button>
    <button class="btn" id="dialogBtn">知乎对话</button>
  </div>
</div>

<div class="actions btns">
  <button class="btn btn-primary" id="applyBtn">应用</button>
  <button class="btn" id="resetBtn">重置</button>
</div>
<div class="status" id="statusText"></div>

</div><!-- .content -->

<div id="winBorder" style="display:none;position:fixed;inset:0;border:2px solid rgba(255,0,80,0.8);pointer-events:none;z-index:9999;box-sizing:border-box;"></div>
<script src="settings.js"></script>
</body>
</html>
