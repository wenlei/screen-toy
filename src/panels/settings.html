<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    font: 13px/1.5 -apple-system, BlinkMacSystemFont, sans-serif;
    color: #333;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
  }

  .titlebar {
    height: 44px;
    flex-shrink: 0;
    background: #ebebeb;
    border-bottom: 1px solid #d8d8d8;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-app-region: drag;
    font-size: 13px;
    font-weight: 500;
    color: #333;
    letter-spacing: -0.1px;
  }

  .content {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px 20px;
  }

  .group { margin-bottom: 14px; }
  .group label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }
  hr { border: none; border-top: 1px solid #e0e0e0; margin: 14px 0; }

  .btn {
    display: inline-block; padding: 5px 14px;
    border-radius: 4px; border: 1px solid #bbb; cursor: pointer;
    font-size: 12px; font-weight: 400; background: #fff; color: #444;
    transition: all 0.12s;
  }
  .btn:hover { background: #f0f0f0; border-color: #aaa; }
  .btn-primary { background: #444; color: #fff; border-color: #444; }
  .btn-primary:hover { background: #555; }

  .status { font-size: 11px; color: #999; margin-top: 10px; min-height: 16px; }

  .app-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px;
    border-radius: 6px;
    background: #fafafa;
    margin-bottom: 2px;
    border: 1px solid transparent;
  }
  .app-item:hover { background: #f0f0f0; border-color: #e0e0e0; }
  .app-icon { font-size: 16px; width: 22px; text-align: center; flex-shrink: 0; }
  .app-icon img { width: 16px; height: 16px; object-fit: contain; vertical-align: middle; border-radius: 3px; }
  .app-name { font-size: 13px; color: #333; flex: 1; }
  .app-item .del {
    margin-left: auto; cursor: pointer;
    color: #ccc; font-size: 14px; padding: 3px 7px;
    border-radius: 4px; transition: all 0.12s; line-height: 1;
  }
  .app-item .del:hover { color: #e74c3c; background: rgba(231,76,60,0.06); }

  .app-row { display:flex; gap:6px; margin-top: 8px; align-items:center; }

  #customAppSelect {
    flex:1; background: #fff; border: 1px solid #ddd;
    color: #444; padding: 5px 8px; border-radius: 4px;
    font-size: 12px; outline: none; max-width: 200px;
  }
  #customAppSelect:focus { border-color: #999; }

  .add-btn {
    background: #666; color: #fff; border: none;
    padding: 5px 12px; border-radius: 4px;
    font-size: 12px; cursor: pointer; transition: background 0.12s;
    white-space: nowrap;
  }
  .add-btn:hover { background: #555; }

  .actions { display: flex; gap: 8px; margin-top: 4px; }
  .actions.btns { justify-content: flex-end; margin-top: 16px; }

  .anim-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
    margin-top: 6px;
  }
  .anim-btn {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 10px 8px; border-radius: 8px;
    border: 1px solid #ddd; cursor: pointer;
    background: #fff; color: #444;
    font-size: 11px; text-align: center;
    transition: all 0.12s; line-height: 1.2;
    -webkit-app-region: no-drag;
  }
  .anim-btn:hover { background: #f0f0f0; border-color: #aaa; }
  .anim-btn.playing { background: #f0f8e8; border-color: #8bc34a; color: #4a7c1f; }
  .anim-btn .anim-icon { font-size: 20px; }

  input, button, select, textarea, a, .app-item, .btn, .del, .add-btn {
    -webkit-app-region: no-drag;
  }

  .mbti-row { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
  .mbti-label { font-size:12px; color:#666; min-width:60px; }
  .mbti-toggle { display:flex; gap:0; border-radius:6px; overflow:hidden; border:1px solid #ddd; flex:1; }
  .mbti-btn {
    flex:1; padding:6px 4px; border:none; background:#fff; color:#888;
    font-size:11px; cursor:pointer; transition:all 0.15s; text-align:center; white-space:nowrap;
  }
  .mbti-btn.active { background:#007AFF; color:#fff; }
  .mbti-btn:hover:not(.active) { background:#f0f0f0; }
  .mbti-hint { font-size:10px; color:#aaa; margin-top:2px; }
</style>
</head>
<body>

<div class="titlebar">Settings</div>

<div class="content">

<div class="group">
  <label>应用菜单</label>
  <div id="appList" style="display:flex;flex-direction:column;gap:2px;margin-top:4px;"></div>
  <div class="app-row">
    <select id="customAppSelect">
      <option value="">— 选择应用 —</option>
    </select>
    <button class="add-btn" id="addAppBtn">+ 添加</button>
  </div>
</div>

<hr>

<div class="group">
  <label>激活动画</label>
  <div class="anim-grid" id="animGrid"></div>
</div>

<hr>

<div class="group">
  <label>小游戏</label>
  <div class="anim-grid" id="gameGrid">
    <button class="anim-btn" id="sunToggleBtn">
      <span class="anim-icon">🎮</span><span>躲太阳</span>
    </button>
  </div>
</div>

<hr>

<div class="group">
  <label>热榜设置</label>
  <div style="display:flex;align-items:center;gap:8px;margin-top:4px;">
    <label style="font-size:12px;color:#666;">条目数</label>
    <input type="range" id="hotListLimit" min="1" max="30" value="10" style="flex:1;">
    <span class="val" id="hotListLimitVal">10</span>
  </div>
  <div style="font-size:11px;color:#999;margin-top:4px;">点击热榜时获取的条目数量</div>
</div>

<hr>

<div class="group">
  <label>AI Agent</label>
  <div id="aiAgentFields" style="display:flex;flex-direction:column;gap:6px;">
    <select id="agentProvider" style="background:#fff;border:1px solid #ddd;color:#444;padding:5px 8px;border-radius:4px;font-size:12px;outline:none;">
      <option value="zhihu">知乎直答</option>
    </select>
    <select id="zhihuModel" style="background:#fff;border:1px solid #ddd;color:#444;padding:5px 8px;border-radius:4px;font-size:12px;outline:none;">
      <option value="zhida-fast-1p5">快速回答 (zhida-fast-1p5)</option>
      <option value="zhida-thinking-1p5">深度思考 (zhida-thinking-1p5)</option>
      <option value="zhida-agent">智能体 (zhida-agent)</option>
    </select>
    <div id="apiKeyRow1" style="position:relative;">
      <input type="password" id="agentApiKey" placeholder="知乎 Access Secret" title="知乎开放平台密钥，从 developer.zhihu.com/profile 获取，用于 AI 直答/搜索/热榜" style="background:#fff;border:1px solid #ddd;color:#444;padding:5px 60px 5px 8px;border-radius:4px;font-size:12px;outline:none;width:100%;">
      <span id="toggleApiKey" class="material-symbols-outlined" style="position:absolute;right:32px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:18px;user-select:none;color:#aaa;">visibility_off</span>
      <span id="toggleLock" class="material-symbols-outlined" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:18px;user-select:none;color:#aaa;" title="锁定/解锁编辑">lock</span>
    </div>
  </div>
</div>

<hr>

<div class="group">
  <label>回答风格 <span id="mbtiTypeDisplay" style="font-size:11px;color:#007AFF;font-weight:500;"></span></label>
  <div style="display:flex;flex-direction:column;gap:4px;margin-top:4px;">
    <div id="mbtiEI" class="mbti-row">
      <span class="mbti-label">表达方式</span>
      <div class="mbti-toggle">
        <button class="mbti-btn active" data-val="E">E 外向</button>
        <button class="mbti-btn" data-val="I">I 内向</button>
      </div>
    </div>
    <div class="mbti-hint" id="mbtiEI-hint" style="margin-left:68px;">热情外放，喜欢用感叹号，语调活泼，像在和朋友热烈聊天</div>

    <div id="mbtiSN" class="mbti-row">
      <span class="mbti-label">关注点</span>
      <div class="mbti-toggle">
        <button class="mbti-btn" data-val="S">S 实感</button>
        <button class="mbti-btn active" data-val="N">N 直觉</button>
      </div>
    </div>
    <div class="mbti-hint" id="mbtiSN-hint" style="margin-left:68px;">善于看到可能性和趋势，喜欢抽象思考</div>

    <div id="mbtiTF" class="mbti-row">
      <span class="mbti-label">决策方式</span>
      <div class="mbti-toggle">
        <button class="mbti-btn" data-val="T">T 思考</button>
        <button class="mbti-btn active" data-val="F">F 情感</button>
      </div>
    </div>
    <div class="mbti-hint" id="mbtiTF-hint" style="margin-left:68px;">温暖有同理心，注重他人感受，有人情味</div>

    <div id="mbtiJP" class="mbti-row">
      <span class="mbti-label">风格</span>
      <div class="mbti-toggle">
        <button class="mbti-btn" data-val="J">J 判断</button>
        <button class="mbti-btn active" data-val="P">P 感知</button>
      </div>
    </div>
    <div class="mbti-hint" id="mbtiJP-hint" style="margin-left:68px;">灵活随性，回复自然不做作，像即兴聊天</div>
  </div>
</div>

<hr>

<div class="group">
  <label>快捷操作</label>
  <div class="actions">
    <button class="btn" id="menuBtn">应用菜单</button>
    <button class="btn" id="dialogBtn">AI 对话</button>
    <button class="btn" id="openApiPage">🔑 申请 API</button>
  </div>
</div>

</div><!-- .content -->

<script src="settings.js"></script>
</body>
</html>
