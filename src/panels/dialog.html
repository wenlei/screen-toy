<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font:14px/1.5 -apple-system,sans-serif; background:#1e1e2e; color:#cdd6f4; height:100vh; display:flex; flex-direction:column; }
  .header { padding:12px 16px; background:#181825; border-bottom:1px solid #313244; font-size:13px; color:#a6adc8; }
  .messages { flex:1; overflow-y:auto; padding:12px 16px; display:flex; flex-direction:column; gap:8px; }
  .msg { max-width:85%; padding:8px 12px; border-radius:10px; font-size:13px; line-height:1.5; word-break:break-word; }
  .msg.user { align-self:flex-end; background:#cba6f7; color:#1e1e2e; }
  .msg.bot { align-self:flex-start; background:#313244; color:#cdd6f4; }
  .msg.system { align-self:center; background:transparent; color:#6c7086; font-size:12px; }
  .input-row { display:flex; padding:10px 12px; background:#181825; border-top:1px solid #313244; gap:8px; }
  .input-row input { flex:1; background:#313244; border:1px solid #45475a; color:#cdd6f4; padding:8px 12px; border-radius:8px; font-size:13px; outline:none; }
  .input-row input:focus { border-color:#cba6f7; }
  .input-row button { padding:8px 16px; background:#a6e3a1; color:#1e1e2e; border:none; border-radius:8px; cursor:pointer; font-size:13px; font-weight:600; }
</style>
</head>
<body>
<div class="header">问问知乎 (API Mock)</div>
<div class="messages" id="msgs">
  <div class="msg system">连接知识库...</div>
</div>
<div class="input-row">
  <input type="text" id="input" placeholder="输入问题..." autofocus>
  <button id="sendBtn">发送</button>
</div>
<div id="winBorder" style="display:none;position:fixed;inset:0;border:2px solid rgba(255,0,80,0.8);pointer-events:none;z-index:9999;box-sizing:border-box;"></div>
<script src="dialog.js"></script>
</body>
</html>
