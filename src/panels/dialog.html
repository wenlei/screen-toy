<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font:14px/1.5 -apple-system,sans-serif; background:#F5F5F7; color:#1C1C1E; height:100vh; display:flex; flex-direction:column; }
  .header { padding:12px 16px; background:#FFFFFF; border-bottom:1px solid #E5E5EA; font-size:13px; color:#6E6E73; }
  .messages { flex:1; overflow-y:auto; padding:12px 16px; display:flex; flex-direction:column; gap:8px; }
  .msg { max-width:85%; padding:8px 12px; border-radius:10px; font-size:13px; line-height:1.6; word-break:break-word; overflow-wrap:break-word; }
  .msg.user { align-self:flex-end; background:#007AFF; color:#fff; }
  .msg.bot { align-self:flex-start; background:#FFFFFF; color:#1C1C1E; box-shadow:0 1px 2px rgba(0,0,0,0.08); }
  .msg.system { align-self:center; background:transparent; color:#AEAEB2; font-size:12px; }

  /* Markdown styles inside bot messages */
  .msg.bot h1 { font-size:18px; margin:6px 0 4px; }
  .msg.bot h2 { font-size:15px; margin:5px 0 3px; }
  .msg.bot h3 { font-size:14px; margin:4px 0 2px; }
  .msg.bot p { margin:4px 0; }
  .msg.bot p:first-child { margin-top:0; }
  .msg.bot p:last-child { margin-bottom:0; }
  .msg.bot ul, .msg.bot ol { margin:4px 0; padding-left:18px; }
  .msg.bot li { margin:1px 0; }
  .msg.bot code {
    background:#F2F2F7; padding:1px 4px; border-radius:3px;
    font-family:'SF Mono',Menlo,monospace; font-size:12px;
  }
  .msg.bot pre {
    background:#1C1C1E; color:#E5E5EA; padding:10px 12px;
    border-radius:8px; margin:6px 0; overflow-x:auto;
    font-family:'SF Mono',Menlo,monospace; font-size:12px;
    line-height:1.4; white-space:pre-wrap;
  }
  .msg.bot pre code { background:none; padding:0; color:inherit; font-size:inherit; }
  .msg.bot blockquote {
    border-left:3px solid #007AFF; padding-left:10px; margin:6px 0;
    color:#6E6E73;
  }
  .msg.bot hr { border:none; border-top:1px solid #E5E5EA; margin:8px 0; }
  .msg.bot strong { font-weight:600; }
  .msg.bot em { font-style:italic; }

  .input-row { display:flex; padding:10px 12px; background:#FFFFFF; border-top:1px solid #E5E5EA; gap:8px; }
  .input-row input { flex:1; background:#F2F2F7; border:1px solid #E5E5EA; color:#1C1C1E; padding:8px 12px; border-radius:8px; font-size:13px; outline:none; }
  .input-row input:focus { border-color:#007AFF; }
  .input-row button { padding:8px 16px; background:#34C759; color:#fff; border:none; border-radius:8px; cursor:pointer; font-size:13px; font-weight:600; }
</style>
</head>
<body>
<div class="header">
  AI 对话
  <button id="clearBtn" style="float:right;background:none;border:1px solid #E5E5EA;border-radius:6px;padding:2px 10px;font-size:12px;color:#6E6E73;cursor:pointer;">新会话</button>
</div>
<div class="messages" id="msgs">
  <div class="msg system">连接 AI 服务...</div>
</div>
<div class="input-row">
  <input type="text" id="input" placeholder="输入问题..." autofocus>
  <button id="sendBtn">发送</button>
</div>
<div id="winBorder" style="display:none;position:fixed;inset:0;border:2px solid rgba(255,0,80,0.8);pointer-events:none;z-index:9999;box-sizing:border-box;"></div>
<script src="dialog.js"></script>
</body>
</html>
