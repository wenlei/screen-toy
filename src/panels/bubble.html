<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:transparent; overflow:hidden; }

  .wrapper {
    position: relative;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.22s ease, transform 0.22s ease;
    display: inline-block;
  }
  .wrapper.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .bubble-bg {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: url('../assets/speech_bubble.png') no-repeat center center;
    background-size: 100% 100%;
    pointer-events: none;
  }

  .text {
    position: relative;
    /* Inset from bubble edges: left/right 12%, top 13%, bottom 30% (tail ≈18% + padding) */
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font: 13px/1.55 -apple-system, BlinkMacSystemFont, sans-serif;
    color: #1C1C1E;
    text-align: center;
    word-break: break-word;
    pointer-events: none;
    overflow: hidden;
  }
  .text b { font-weight: 600; }
  .text i { font-style: italic; color: #444; }
  .text code {
    background: rgba(0,0,0,0.06); padding: 1px 4px; border-radius: 3px;
    font-family: 'SF Mono', Menlo, monospace; font-size: 12px;
  }
</style>
</head>
<body>
<div class="wrapper" id="wrapper">
  <div class="bubble-bg"></div>
  <div class="text" id="textEl"></div>
</div>
<script src="bubble.js"></script>
</body>
</html>
