<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Screen Toy — 知乎登录</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font:16px/1.5 -apple-system, sans-serif; background:#F5F5F7; display:flex; justify-content:center; align-items:center; min-height:100vh; }
  .card { background:#fff; border-radius:12px; padding:32px 40px; box-shadow:0 2px 12px rgba(0,0,0,0.08); max-width:400px; text-align:center; }
  h1 { font-size:20px; margin-bottom:8px; }
  p { color:#6E6E73; font-size:14px; margin-bottom:24px; }
  .btn { display:inline-block; background:#007AFF; color:#fff; padding:10px 32px; border-radius:8px; font-size:15px; font-weight:600; text-decoration:none; border:none; cursor:pointer; }
  .btn:hover { opacity:0.9; }
  .info { color:#6E6E73; font-size:12px; margin-top:16px; }
</style>
</head>
<body>
<div class="card">
  <h1>Screen Toy</h1>
  <p>用知乎账号登录</p>
  <button class="btn" onclick="login()">🔑 用知乎登录</button>
  <div class="info">
    APP_ID: 241<br>
    redirect_uri: wenlei.github.io/screen-toy/callback
  </div>
</div>
<script>
var APP_ID = '241';
var REDIRECT_URI = 'https://wenlei.github.io/screen-toy/callback';

function login() {
  window.location.href = 'https://openapi.zhihu.com/authorize?' +
    'redirect_uri=' + encodeURIComponent(REDIRECT_URI) +
    '&app_id=' + APP_ID +
    '&response_type=code';
}
</script>
</body>
</html>
