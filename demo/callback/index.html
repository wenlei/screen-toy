<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screen Toy — OAuth 回调</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font:14px/1.5 -apple-system, sans-serif; background:#F5F5F7; display:flex; justify-content:center; align-items:center; min-height:100vh; }
  .card { background:#fff; border-radius:12px; padding:24px 32px; box-shadow:0 2px 12px rgba(0,0,0,0.08); max-width:480px; width:100%; }
  h2 { font-size:18px; margin-bottom:16px; }
  .code { background:#1C1C1E; color:#30D158; padding:12px 16px; border-radius:8px; font:13px 'SF Mono', monospace; word-break:break-all; margin-bottom:12px; }
  .result { background:#F2F2F7; padding:12px 16px; border-radius:8px; font:12px 'SF Mono', monospace; white-space:pre-wrap; max-height:300px; overflow-y:auto; margin-bottom:12px; }
  .error { color:#FF3B30; font-size:13px; margin-bottom:12px; }
  .info { color:#6E6E73; font-size:13px; margin-bottom:4px; }
  .btn { display:inline-block; background:#007AFF; color:#fff; padding:8px 20px; border-radius:6px; font-size:13px; font-weight:600; text-decoration:none; border:none; cursor:pointer; }
  .btn:hover { opacity:0.9; }
  label { display:block; font-size:13px; color:#6E6E73; margin-bottom:6px; }
</style>
</head>
<body>
<div class="card">
  <h2>OAuth 回调</h2>
  <div id="step1">
    <p class="info">正在获取授权码...</p>
  </div>
  <div id="step2" style="display:none">
    <p class="info">授权码：</p>
    <div class="code" id="codeDisplay"></div>
    <p class="info">正在用授权码换取 access_token...</p>
    <div class="result" id="tokenResult"></div>
    <p class="error" id="tokenError"></p>
  </div>
  <a href="../login.html" class="btn">← 重新登录</a>
</div>
<script>
var APP_ID = '241';
var APP_KEY = '6e7e993d66504acb8ab7c4786ed00355';
var REDIRECT_URI = 'https://wenlei.github.io/screen-toy/callback';

var params = new URLSearchParams(window.location.search);
var code = params.get('code');

if (!code) {
  // 调试：显示所有收到参数
  var allParams = [];
  params.forEach(function (v, k) { allParams.push(k + '=' + v); });
  var debugInfo = '收到参数: ' + (allParams.length ? allParams.join(', ') : '(无)') +
    '\n完整URL: ' + window.location.href;

  // 知乎可能返回了错误信息
  var error = params.get('error');
  var errorDesc = params.get('error_description');
  if (error) {
    document.getElementById('step1').innerHTML =
      '<p class="error">授权被拒绝：' + (errorDesc || error) + '</p>' +
      '<p class="info">' + debugInfo + '</p>' +
      '<p class="info">redirect_uri: <code>' + REDIRECT_URI + '</code></p>';
  } else {
    document.getElementById('step1').innerHTML =
      '<p class="error">未收到授权码</p>' +
      '<pre class="result">' + debugInfo + '</pre>' +
      '<p class="info">请确认 redirect_uri 已在知乎后台注册：<br><code>' + REDIRECT_URI + '</code></p>';
  }
} else {
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
  document.getElementById('codeDisplay').textContent = code;

  // 交换 access_token
  var body = new URLSearchParams({
    app_id: APP_ID,
    app_key: APP_KEY,
    grant_type: 'authorization_code',
    redirect_uri: REDIRECT_URI,
    code: code,
  });

  fetch('https://openapi.zhihu.com/access_token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: body.toString(),
  })
  .then(function (res) { return res.json(); })
  .then(function (data) {
    if (data.access_token) {
      document.getElementById('tokenResult').textContent =
        '✅ access_token 获取成功！\n\n' +
        'token: ' + data.access_token + '\n' +
        'type: ' + (data.token_type || 'Bearer') + '\n' +
        'expires_in: ' + (data.expires_in || 'N/A') + ' 秒';
    } else {
      document.getElementById('tokenError').textContent =
        '❌ 交换失败：' + JSON.stringify(data, null, 2);
    }
  })
  .catch(function (err) {
    document.getElementById('tokenError').textContent =
      '⚠️ 网络错误：' + err.message + '\n可能被 CORS 阻止，请在后端交换 token。';
  });
}
</script>
</body>
</html>
